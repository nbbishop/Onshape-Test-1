<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>McMaster Launcher</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #fff; color: #1a1a18;
        display: flex; align-items: flex-start; justify-content: center;
      }
      .wrap { width: 100%; max-width: 360px; padding: 18px 16px; }
      .head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
      .logo {
        width: 26px; height: 26px; border-radius: 6px; background: #fbeaea; color: #a32d2d;
        display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 13px;
      }
      .title { font-size: 15px; font-weight: 500; margin: 0; }
      .hint { font-size: 11px; color: #8a8980; margin: 2px 0 0; }
      .searchrow { display: flex; gap: 8px; }
      #q {
        flex: 1; height: 38px; padding: 0 12px; font-size: 14px;
        border: 1px solid #d8d6cf; border-radius: 8px; outline: none;
      }
      #q:focus { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
      #go {
        height: 38px; padding: 0 16px; font-size: 13px; font-weight: 500; cursor: pointer;
        background: #e6f1fb; color: #185fa5; border: 1px solid #b5d4f4; border-radius: 8px;
      }
      #go:hover { background: #d8e9f8; }
      .note { font-size: 11px; color: #8a8980; line-height: 1.5; margin: 14px 0 0; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <div class="logo">M</div>
        <div>
          <p class="title">Search McMaster</p>
          <p class="hint">Opens results in a new tab — pick a part, use the chip to import.</p>
        </div>
      </div>

      <div class="searchrow">
        <input id="q" type="text" placeholder="e.g. M6 screw" autocomplete="off" />
        <button id="go">Search</button>
      </div>

      <p class="note" id="status"></p>
    </div>

    <script src="launcher.js"></script>
  </body>
</html>
