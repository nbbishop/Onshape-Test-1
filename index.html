<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>McMaster-Carr Launcher</title>
<style>
:root{
 --bg:#ffffff;--card:rgba(255,255,255,.85);--text:#1b1b1b;--muted:#666;
 --green:#2f6f3e;--green-hover:#3b854d;--border:rgba(0,0,0,.08);
 --input-bg:#fff;--shadow:0 8px 30px rgba(0,0,0,.08);
}
:root[data-theme="dark"]{
 --bg:#333333;--card:rgba(58,58,58,.85);--text:#f3f3f3;--muted:#a8a8a8;
 --green:#2f6f3e;--green-hover:#3b854d;--border:rgba(255,255,255,.08);
 --input-bg:#404040;--shadow:0 12px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box} html,body{height:100%;margin:0}
body{display:flex;justify-content:center;align-items:center;background:var(--bg);
font-family:Segoe UI,Roboto,sans-serif;color:var(--text)}
.hero{
 width:min(900px,92vw);padding:50px;border-radius:24px;
 background:var(--card);backdrop-filter:blur(12px);
 border:1px solid var(--border);box-shadow:var(--shadow);text-align:center;
}
.logo{width:500px;max-width:90%;height:auto;margin-bottom:30px}
.searchrow{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
#q{
 width:420px;height:52px;padding:0 16px;border-radius:14px;
 border:1px solid #555;background:var(--input-bg);color:var(--text);font-size:16px
}
#go{
 height:52px;padding:0 24px;border:none;border-radius:14px;
 background:var(--green);color:#fff;font-weight:600;cursor:pointer
}
#go:hover{background:var(--green-hover)}
.theme-toggle{
 position:fixed;top:16px;right:16px;width:42px;height:42px;border-radius:10px
}
#status{margin-top:16px;color:var(--muted)}
</style>
</head>
<body>
<button id="theme" class="theme-toggle">☀️</button>
<main class="hero">
<img src="mcmaster-logo.png" class="logo" alt="McMaster-Carr">
<div class="searchrow">
<input id="q" placeholder="Search McMaster parts..." autocomplete="off">
<button id="go">Search</button>
</div>
<div id="status"></div>
</main>
<script src="launcher.js"></script>
</body>
</html>
